<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Alimentos - NOTAS FISCAIS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <aside class="sidebar left">
        <nav class="navbar">
            <h1>SOS ALIMENTOS</h1>

            <ul class="nav-links">
                <li><a href="#" data-page="clientes">Clientes</a></li>
                <li><a href="#" data-page="notas">Notas</a></li>
                <li><a href="#" data-page="lixeira">Lixeira</a></li>
            </ul>

            <div class="sidebar-actions">
                <button id="btnAbrirModalCliente">+ Cliente</button>
                <button id="btnNovaNota">+ Nota</button>
            </div>
        </nav>
    </aside>

    <main>

        <div id="modal-container" class="modal-overlay" style="display: none">
            <div class="modal-card">
                <button id="btn-fechar-modal" class="close-button">&times;</button>
                <h2>Registrar Novo Cliente <span>SOS</span></h2>
                <form id="formNovoCliente">
                    <div class="grid">
                        <label>Nome do cliente*<input type="text" name="cliente" id="cliente"
                                placeholder="Digite o nome do novo cliente" autocomplete="off">
                        </label>
                    </div>
                    <div class="grid">
                        <label>E-mail<input type="email" name="email"
                                placeholder="Insira o e-mail do cliente (opcional)" />
                        </label>
                    </div>
                    <div class="grid">
                        <label>CNPJ<input type="text" name="cnpj" id="cnpj" placeholder="Digite o CNPJ do cliente" />
                        </label>
                    </div>
                    <div class="grid grid-three-fourths">
                        <label><span>Endereço*<input id="adress" name="adress" type="text"
                                    placeholder="Insira o endereço do cliente (obrigatório)" required></span></label>
                        <label>Complemento<input id="complemento" name="complemento" type="text"></label>
                    </div>

                    <button id="btnSubmitCliente" name="btnSubmitCliente" type="submit" class="button">ENVIAR</button>
                </form>
            </div>
        </div>

        <div id="modal-containerNota" class="modal-overlay" style="display: none">
            <div class="modal-card-nota">

                <button id="btn-fechar-modal-nota" class="close-button">
                    &times;
                </button>

                <h2>Registrar <span>Nota Fiscal</span></h2>

                <form id="formNota">

                    <input type="hidden" id="idCliente" name="idCliente">

                    <div class="grid">
                        <label for="clienteNota">Cliente*</label>
                        <div class="autocomplete">
                            <input type="text" id="clienteNota" name="cliente" autocomplete="off"
                                placeholder="Digite o nome do cliente">
                            <div id="listaClientes" class="autocomplete-list">
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-two">
                        <div>
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="email" placeholder="Preenchido automaticamente">
                        </div>
                        <div>
                            <label for="numeroNota">Nº da Nota</label>
                            <input type="number" id="numeroNota" name="numeroNota" readonly>
                        </div>
                    </div>

                    <div class="grid grid-two">
                        <div>
                            <label for="dataEmissao">Data de Emissão</label>
                            <input type="date" id="dataEmissao" name="dataEmissao" readonly>
                        </div>
                        <div>
                            <label for="valor">Valor*</label>
                            <input type="number" id="valor" name="valor" step="0.01" placeholder="0,00" required>
                        </div>
                    </div>

                    <div class="grid">
                        <label for="img">Foto da Nota Fiscal</label>
                        <input type="file" id="img" name="img" accept="image/*" capture="environment">
                    </div>



                    <button id="btnSubmitNota" type="submit" class="button">Registrar Nota </button>

                </form>

            </div>
        </div>

        <section id="inicial">
            <div class="inicial-menu" id="inicial-menu">
                <h1>Bem-vindo 👋</h1>
                <div class="info-boxes">
                    <div class="info-box">
                        <span>📅 Data de hoje</span>
                        <strong id="dataAtual">--</strong>
                    </div>
                    <div class="info-box">
                        <span>🕒 Horário atual</span>
                        <strong id="horaAtual">--:--:--</strong>
                    </div>
                </div>
            </div>
            <div id="inicialConteudo"></div>
        </section>

        <section id="clientes" hidden>
            <div id="clientesConteudo"></div>
        </section>

        <section id="notas" hidden>
            <button></button>
        </section>

        <section id="lixeira" hidden>
            <button></button>
        </section>
    </main>



    <script src="script.js"></script>
</body>

</html>
