<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Alimentos - NOTAS FISCAIS</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <aside class="sidebar left">
        <nav class="navbar">
            <h1>SOS ALIMENTOS</h1>

            <ul class="nav-links">
                <li><a href="#" data-page="clientes">Clientes</a></li>
                <li><a href="#" data-page="notas">Notas</a></li>
                <li><a href="#" data-page="lixeira">Lixeira</a></li>
            </ul>

            <div class="sidebar-actions">
                <button id="btnNovoCliente">+ Cliente</button>
                <button id="btnNovaNota">+ Nota</button>
            </div>
        </nav>
    </aside>

    <main>
        <section id="inicial">
            <div class="inicial-menu" id="inicial-menu">
                <h1>Bem-vindo 👋</h1>

                <div class="info-boxes"
                    style="display: flex; gap: 1.25rem; flex-wrap: wrap; justify-content: center; width: 100%;"></div>
                <div class="info-box">
                    <span>📅 Data completa:</span>
                    <strong id="dataAtual">--</strong>
                </div>

                <div class="info-box">
                    <span>🕒 Horário atual:</span>
                    <strong id="horaAtual">--:--:--</strong>
                </div>
            </div>

            <div id="inicialConteudo"></div>
        </section>

        <section id="clientes">
            <div class="clientes-menu" id="clientes-menu">
                <button id="btnPesquisarCliente">PESQUISAR CLIENTES</button>
                <button id="btnCadastrarCadastrar">CADASTRAR CLIENTES</button>
            </div>
            <div id="clientesConteudo"></div>
        </section>

        <section id="notas">
            <button></button>
        </section>

        <section id="lixeira">
            <button></button>
        </section>
    </main>



    <script src="script.js"></script>
</body>

</html>
