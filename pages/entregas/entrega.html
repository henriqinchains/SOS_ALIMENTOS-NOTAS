<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO de Nota SOS</title>
    <link rel="stylesheet" href="entrega.css">
</head>

<body>

    <main class="container">
        <div class="card-entrega">

            <h2>Registrar Entrega</h2>
            <p>Preencha os dados abaixo para enviar a nota.</p>

            <form id="form-entrega">

                <div class="campo">
                    <label for="cliente">Cliente</label>
                    <input type="text" id="cliente" name="cliente" list="lista-clientes"
                        placeholder="Digite ou selecione um cliente" autocomplete="off" required>

                    <datalist id="lista-clientes">
                    </datalist>
                </div>

                <div class="campo">
                    <label for="valorNota">Valor da Nota (R$)</label>
                    <input type="number" id="valorNota" name="valorNota" placeholder="0,00" step="0.01" min="0"
                        required>
                </div>

                <div class="campo">
                    <label for="imagemNota">Imagem da Nota Fiscal</label>
                    <input type="file" id="imagemNota" name="imagemNota" accept="image/*" required>
                </div>

                <button type="submit" id="btnEnviar">
                    Enviar
                </button>

            </form>

        </div>
    </main>
    <script src="entrega.js" defer></script>
</body>

</html>
